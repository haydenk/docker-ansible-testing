name: Bug Report
description: Something isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all relevant sections — the more detail, the faster we can help.

  - type: input
    id: version
    attributes:
      label: Image version / release tag
      placeholder: "e.g. 20260309 (check the release tag or image label)"
    validations:
      required: true

  - type: dropdown
    id: distro
    attributes:
      label: Distribution
      options:
        - debian
        - ubuntu
        - fedora
        - rockylinux
        - amazonlinux
        - alpine
    validations:
      required: true

  - type: input
    id: distro_version
    attributes:
      label: Distribution version
      placeholder: "e.g. bookworm-slim, noble, 41, 9-minimal, 2023, 3.21"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - linux/amd64
        - linux/arm64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I run X against this image, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Pull `ghcr.io/haydenk/debian:bookworm-slim-20260309`
        2. Run `docker run --rm ... ansible --version`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste any relevant output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that might help.
