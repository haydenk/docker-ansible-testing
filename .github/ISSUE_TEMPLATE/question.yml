name: Question / Help
description: Ask a question about usage or behaviour.
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a question, please check the [README](https://github.com/haydenk/docker-ansible-testing/blob/master/README.md) and [Discussions](https://github.com/haydenk/docker-ansible-testing/discussions) — your answer may already be there.

  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
      placeholder: "How do I...? Why does...? Is it possible to...?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've already tried
      description: Steps you took, docs you read, commands you attempted.
      placeholder: |
        - Checked the README
        - Tried running `docker run --rm ghcr.io/haydenk/debian:bookworm-slim ansible --version`
        - Searched existing issues

  - type: markdown
    attributes:
      value: "### Environment"

  - type: dropdown
    id: distro
    attributes:
      label: Distribution
      options:
        - debian
        - ubuntu
        - fedora
        - rockylinux
        - amazonlinux
        - alpine
    validations:
      required: true

  - type: input
    id: distro_version
    attributes:
      label: Distribution version
      placeholder: "e.g. bookworm-slim, noble, 41, 9-minimal, 2023, 3.21"
    validations:
      required: true

  - type: input
    id: image_tag
    attributes:
      label: Image tag used
      placeholder: "e.g. 20260309"
