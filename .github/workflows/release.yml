name: Release

on:
  push:
    tags:
      - "202[0-9][01][0-9][0-3][0-9]"
      - "202[0-9][01][0-9][0-3][0-9].[0-9][0-9]*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. 20260311)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  setup:
    name: Load matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate and resolve tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" \
              --silent || { echo "Error: tag '${TAG}' does not exist." >&2; exit 1; }
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set matrix
        id: set-matrix
        run: echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  release:
    name: ${{ matrix.distro }}:${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./${{ matrix.distro }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.distro }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.distro }}:${{ matrix.version }}-${{ needs.setup.outputs.tag }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.version }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, release]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release body
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"

          {
            echo "## Images"
            echo ""
            echo "| Image | Tags |"
            echo "|-------|------|"
            jq -r --arg tag "$TAG" --arg reg "$REGISTRY" \
              '.[] | "| `\($reg)/\(.distro)` | `\(.version)`, `\(.version)-\($tag)` |"' \
              matrix.json
            echo ""
            echo "## Usage"
            echo ""
            echo '```bash'
            echo "# Pull (floating tag, always points to the latest release)"
            echo "docker pull ${REGISTRY}/debian:bookworm-slim"
            echo ""
            echo "# Pull (pinned to this release)"
            echo "docker pull ${REGISTRY}/debian:bookworm-slim-${TAG}"
            echo ""
            echo "# Verify Ansible"
            echo "docker run --rm ${REGISTRY}/debian:bookworm-slim ansible --version"
            echo ""
            echo "# Run a playbook from the current directory"
            echo 'docker run --rm \'
            echo '  -v "$(pwd)":/ansible \'
            echo "  ${REGISTRY}/debian:bookworm-slim \\"
            echo "  ansible-playbook /ansible/playbook.yml"
            echo '```'
          } > release-body.md

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: ${{ needs.setup.outputs.tag }}
          body_path: release-body.md
          generate_release_notes: true
