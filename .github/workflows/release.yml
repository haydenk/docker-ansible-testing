name: Release

on:
  push:
    tags:
      - "202[0-9][01][0-9][0-3][0-9]"
      - "202[0-9][01][0-9][0-3][0-9].[0-9][0-9]*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  setup:
    name: Load matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set matrix
        id: set-matrix
        run: echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  release:
    name: ${{ matrix.distro }}:${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./${{ matrix.distro }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.distro }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.distro }}:${{ matrix.version }}-${{ github.ref_name }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.version }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build release body
        run: |
          TAG="${{ github.ref_name }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"

          {
            echo "## Images"
            echo ""
            echo "| Image | Tags |"
            echo "|-------|------|"
            jq -r --arg tag "$TAG" --arg reg "$REGISTRY" \
              '.[] | "| `\($reg)/\(.distro)` | `\(.version)`, `\(.version)-\($tag)` |"' \
              matrix.json
            echo ""
            echo "## Usage"
            echo ""
            echo '```bash'
            echo "# Pull (floating tag, always points to the latest release)"
            echo "docker pull ${REGISTRY}/debian:bookworm-slim"
            echo ""
            echo "# Pull (pinned to this release)"
            echo "docker pull ${REGISTRY}/debian:bookworm-slim-${TAG}"
            echo ""
            echo "# Verify Ansible"
            echo "docker run --rm ${REGISTRY}/debian:bookworm-slim ansible --version"
            echo ""
            echo "# Run a playbook from the current directory"
            echo 'docker run --rm \'
            echo '  -v "$(pwd)":/ansible \'
            echo "  ${REGISTRY}/debian:bookworm-slim \\"
            echo "  ansible-playbook /ansible/playbook.yml"
            echo '```'
          } > release-body.md

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
