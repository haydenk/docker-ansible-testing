name: CI

on:
  push:
    branches:
      - master
      - develop
      - "feature/**"
  pull_request:
    branches:
      - master
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  workflow_dispatch:

jobs:
  setup:
    name: Load matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set matrix
        id: set-matrix
        run: echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  hadolint:
    name: Lint Dockerfile (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: ["debian", "ubuntu", "fedora", "rockylinux", "amazonlinux", "alpine"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ./${{ matrix.distro }}/Dockerfile

  build:
    name: Build ${{ matrix.distro }}:${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: [setup, hadolint]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./${{ matrix.distro }}
          platforms: ${{ matrix.platforms }}
          push: false
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}-${{ matrix.version }}

  test:
    name: Test ${{ matrix.distro }}:${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: [setup, build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./${{ matrix.distro }}
          platforms: linux/amd64
          push: false
          load: true
          tags: test/${{ matrix.distro }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.version }}

      - name: Verify ansible
        run: docker run --rm test/${{ matrix.distro }}:${{ matrix.version }} ansible --version

      - name: Verify python
        run: docker run --rm test/${{ matrix.distro }}:${{ matrix.version }} python3 --version

      - name: Verify inventory
        run: docker run --rm test/${{ matrix.distro }}:${{ matrix.version }} test -f /etc/ansible/hosts
